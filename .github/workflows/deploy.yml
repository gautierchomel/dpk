name: Build and Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        env:
          APOS_EXTERNAL_FRONT_KEY: ${{ secrets.APOS_EXTERNAL_FRONT_KEY }}
          APOS_HOST: ${{ secrets.APOS_HOST }}
        run: npm run build

      - name: Verify Netlify SSR output
        run: |
          test -d .netlify/v1/functions/ssr
          test -d .netlify/build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: netlify-build-output
          path: |
            dist
            .netlify
          if-no-files-found: error

      - name: Deploy preview to Netlify (PR)
        if: github.event_name == 'pull_request'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          APOS_EXTERNAL_FRONT_KEY: ${{ secrets.APOS_EXTERNAL_FRONT_KEY }}
          APOS_HOST: ${{ secrets.APOS_HOST }}
        run: npx netlify deploy --build --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"

      - name: Deploy production to Netlify (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          APOS_EXTERNAL_FRONT_KEY: ${{ secrets.APOS_EXTERNAL_FRONT_KEY }}
          APOS_HOST: ${{ secrets.APOS_HOST }}
        run: npx netlify deploy --build --prod --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
