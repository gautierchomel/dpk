name: Build SSR Artifact

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-ssr
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APOS_EXTERNAL_FRONT_KEY: ci-build-key
      APOS_HOST: http://localhost:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify SSR output
        run: |
          test -f dist/server/entry.mjs
          test -d dist/client

      - name: Upload SSR artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-ssr-dist
          path: dist
          if-no-files-found: error
